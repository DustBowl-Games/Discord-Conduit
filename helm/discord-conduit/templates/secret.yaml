{{- /*
Render a Secret holding the bot token ONLY when an inline token value is
provided AND no existing Secret is referenced. When token.existingSecret is set
the user manages the Secret themselves and we render nothing here.
*/ -}}
{{- if and (not .Values.token.existingSecret) .Values.token.value -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "discord-conduit.fullname" . }}
  labels:
    {{- include "discord-conduit.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ .Values.token.value | quote }}
{{- end }}
