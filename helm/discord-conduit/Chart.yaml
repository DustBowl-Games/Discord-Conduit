apiVersion: v2
name: discord-conduit
description: >-
  Headless Discord Conduit bot — moves Discord messages between channels and
  threads via slash commands. Runs the CLI bot mode as a single long-running
  Kubernetes workload (the gateway connection is a singleton).
type: application

# Chart version — bump on every chart change.
version: 0.1.0

# Version of the application this chart deploys. Used as the default image tag.
appVersion: "1.0.0"

home: https://github.com/DustBowl-Games/Discord-Conduit
sources:
  - https://github.com/DustBowl-Games/Discord-Conduit

keywords:
  - discord
  - bot
  - migration

maintainers:
  - name: DustBowl Games
    url: https://github.com/DustBowl-Games
